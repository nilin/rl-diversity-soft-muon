<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1f2933;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 20px 52px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 680;
        letter-spacing: 0;
      }

      p {
        max-width: 760px;
        margin: 0 0 14px;
        color: #52616f;
        font-size: 16px;
        line-height: 1.55;
      }

      a {
        color: #2563a6;
        font-weight: 620;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      p:has(> img) {
        max-width: none;
        margin: 28px 0 0;
        padding: 18px 18px 0;
        background: #ffffff;
        border: 1px solid #d9e0e7;
        border-bottom: 0;
        border-radius: 8px 8px 0 0;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }

      p:has(> img) + p {
        max-width: none;
        margin: 0;
        padding: 12px 18px 18px;
        background: #ffffff;
        border: 1px solid #d9e0e7;
        border-top: 0;
        border-radius: 0 0 8px 8px;
        color: #667381;
        font-size: 14px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
