<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RL Diversity Soft-Muon</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1f2933;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 20px 52px;
      }

      header {
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 680;
        letter-spacing: 0;
      }

      p {
        max-width: 760px;
        margin: 0;
        color: #52616f;
        font-size: 16px;
        line-height: 1.55;
      }

      figure {
        margin: 28px 0 0;
        padding: 18px;
        background: #ffffff;
        border: 1px solid #d9e0e7;
        border-radius: 8px;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }

      figcaption {
        margin-top: 12px;
        color: #667381;
        font-size: 14px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>RL Diversity Soft-Muon</h1>
        <p>
          Best@k comparison for 7x7 Maze RLVR runs at learning rate 3e-6, excluding
          VPO and k=1.
        </p>
      </header>
      <figure>
        <img
          src="assets/best-at-k-lr3e-6.png"
          alt="Best@k curve comparing AdamW Multi-RLVR and Soft-Muon p=0.4 at learning rate 3e-6."
        >
        <figcaption>
          Mean best@k over route pools for AdamW Multi-RLVR and fixed-coefficient
          Soft-Muon p=0.4.
        </figcaption>
      </figure>
    </main>
  </body>
</html>
